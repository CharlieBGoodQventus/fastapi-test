apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: document-assistant
  title: Document Assistant
  description: A Django service for OCR-based text extraction and LLM-assisted document classification and routing, deployed on Kubernetes.
  labels:
    tier: backend
  annotations:
    github.com/project-slug: analyticsMD/document-assistant
    github.com/workflows: pr-preview-build.yml,pr-pre-commit.yml,pr-code.yml,build.yml,deploy.yml,deploy_argocd.yml,pr-helm.yml,qa-deployments.yml,prod-deployments.yml,release-reminder.yml
    # ArgoCD integration
    argocd/app-namespace: np-argocd
    argocd/app-name: document-assistant
    argocd/instance-name: main
    # TechDocs
    backstage.io/techdocs-ref: url:https://github.com/analyticsMD/document-assistant
    # Kubernetes discovery
    backstage.io/kubernetes-id: document-assistant
    backstage.io/kubernetes-namespace: document-assistant
    backstage.io/kubernetes-label-selector: app.kubernetes.io/name in (document-assistant-web-server,document-assistant-document-consumer,document-assistant-routing-consumer)
    # Links
    backstage.io/source-location: url:https://github.com/analyticsMD/document-assistant
  tags:
    - python
    - django
    - backend
    - api
    - postgresql
    - kubernetes
    - ocr
    - llm
    - document-processing
  links:
    - url: https://github.com/analyticsMD/document-assistant
      title: GitHub Repository
      icon: github
spec:
  type: service
  owner: apps-team
  lifecycle: production
  providesApis:
    - document-assistant-api
---
apiVersion: backstage.io/v1alpha1
kind: API
metadata:
  name: document-assistant-api
  title: Document Assistant API
  description: REST API for OCR-based document processing, classification, and routing.
  annotations:
    github.com/project-slug: analyticsMD/document-assistant
    backstage.io/source-location: url:https://github.com/analyticsMD/document-assistant
  tags:
    - python
    - django
    - rest
    - openapi
spec:
  type: openapi
  lifecycle: production
  owner: apps-team
  definition:
    $text: url:https://github.com/analyticsMD/document-assistant/blob/main/openapi.yaml
